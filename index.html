<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BioMapa UPTMA</title>
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="sidebar">
        <h1>🌱 BioMapa UPTMA</h1>
        <p>Explora los sectores y la vegetación.</p>
        
        <div class="menu-secciones">
            <h3>Sectores de Suelo</h3>
            <button onclick="irASector(500, 500, 0, 'Sector Norte')">Sector Norte</button>
            <button onclick="irASector(400, 1200, 1, 'Sector Sur')">Sector Sur</button>
            <button onclick="irASector(480, 900, 1, 'Sector Central')">Sector Central</button>
        </div>

        <hr>
        <div id="info-suelo">
            <p><i>Haz clic en un árbol o sector para ver su información técnica.</i></p>
        </div>
    </div>

    <div id="map"></div>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="script.js"></script>
</body>
</html>
